<div class="app-shell">
  <header class="app-header">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="M3 9h18"/>
          <path d="M7 14h4"/>
        </svg>
      </span>
      <div class="brand-text">
        <p class="eyebrow">Business Card Manager</p>
        <h1>Manage cards, imports & exports</h1>
      </div>
    </div>

    <div class="header-actions">
      <button type="button" class="btn-ghost" (click)="exportAll('csv')" [disabled]="isExporting() || cards().length === 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export CSV
      </button>
      <button type="button" class="btn-ghost" (click)="exportAll('xml')" [disabled]="isExporting() || cards().length === 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export XML
      </button>
    </div>
  </header>

  <app-notice />

  <section class="section">
    <div class="panel">
      <app-card-form [isSaving]="isSaving()" (cardSubmit)="onCardSubmit($event)" />
    </div>
  </section>

  <section class="section">
    <div class="panel">
      <app-import-panel [isImporting]="isImporting()" (importConfirmed)="onImportConfirmed($event)" />
    </div>
  </section>

  <section class="section">
    <div class="panel">
      <header class="list-header">
        <div>
          <h2>Stored Business Cards</h2>
          <p>Filter, delete, or export individual cards.</p>
        </div>
        <span class="count-badge">{{ cards().length }} card{{ cards().length === 1 ? '' : 's' }}</span>
      </header>

      <app-card-filters (filtersChanged)="onFiltersChanged($event)" />

      <app-card-list
        [cards]="cards()"
        [isLoading]="isLoading()"
        [isExporting]="isExporting()"
        (cardDeleted)="onCardDeleted($event)"
        (cardExported)="onCardExported($event)" />
    </div>
  </section>

  <footer class="app-footer">
    <p></p>
  </footer>
</div>
