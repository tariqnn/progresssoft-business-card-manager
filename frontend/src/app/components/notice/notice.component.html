@if (notice(); as n) {
  <div class="notice notice-{{ n.kind }}" role="status" aria-live="polite">
    <span class="notice-icon" aria-hidden="true">
      @switch (n.kind) {
        @case ('success') { <svg viewBox="0 0 20 20" fill="currentColor"><path d="M16.7 5.3a1 1 0 0 1 0 1.4l-7 7a1 1 0 0 1-1.4 0l-3.5-3.5a1 1 0 1 1 1.4-1.4L9 11.6l6.3-6.3a1 1 0 0 1 1.4 0Z"/></svg> }
        @case ('error') { <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16Zm-1 4h2v6H9V6Zm0 8h2v2H9v-2Z"/></svg> }
        @case ('info') { <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16Zm1 4H9v2h2V6Zm0 4H9v6h2v-6Z"/></svg> }
      }
    </span>
    <span class="notice-message">{{ n.message }}</span>
    <button type="button" class="notice-close" (click)="dismiss()" aria-label="Dismiss">
      <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6.3 4.9 5 6.3 8.6 10 5 13.7l1.4 1.4L10 11.4l3.7 3.7 1.4-1.4L11.4 10 15 6.3l-1.4-1.4L10 8.6 6.3 4.9Z"/></svg>
    </button>
  </div>
}
